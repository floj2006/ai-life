services:
  - type: web
    name: ai-life-platform
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run db:bootstrap-admin && npm run start
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: APP_ADMIN_EMAILS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: YOOKASSA_SHOP_ID
        sync: false
      - key: YOOKASSA_SECRET_KEY
        sync: false
      - key: YOOKASSA_START_AMOUNT_RUB
        sync: false
      - key: YOOKASSA_MAX_AMOUNT_RUB
        sync: false
